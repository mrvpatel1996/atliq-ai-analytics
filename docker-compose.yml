version: "3.9"

services:
  # ─── PostgreSQL 16 ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: video-sync-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: video_sync
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d video_sync"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── Redis 7 ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: video-sync-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ─── App (optional — uncomment to run everything in Docker) ─
  # app:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: video-sync-app
  #   restart: unless-stopped
  #   ports:
  #     - "3000:3000"
  #   env_file:
  #     - .env
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   environment:
  #     DATABASE_URL: postgresql://postgres:postgres@postgres:5432/video_sync?schema=public
  #     REDIS_URL: redis://redis:6379

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
